name: Build and Push

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set registry and image name
        run: |
          REGISTRY=$(echo "${{ gitea.server_url }}" | sed 's|https\?://||')
          IMAGE_NAME=$(echo "${{ gitea.repository }}" | cut -d'/' -f2 | tr '[:upper:]' '[:lower:]')
          IMAGE=$(echo "${REGISTRY}/${{ gitea.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "REGISTRY=${REGISTRY}" >> $GITHUB_ENV
          echo "IMAGE=${IMAGE}" >> $GITHUB_ENV
          echo "IMAGE_NAME=${IMAGE_NAME}" >> $GITHUB_ENV

      - name: Login to Gitea Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ gitea.actor }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ gitea.sha }}

      - name: Deploy to TrueNAS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.TRUENAS_HOST }}
          username: ${{ secrets.TRUENAS_USER }}
          password: ${{ secrets.TRUENAS_PASSWORD }}
          script: |
            sudo docker login -u ${{ gitea.actor }} -p ${{ secrets.REGISTRY_TOKEN }} ${{ env.REGISTRY }}
            sudo docker pull ${{ env.IMAGE }}:latest
            sudo docker stop ${{env.IMAGE_NAME}} || true
            sudo docker rm ${{env.IMAGE_NAME}} || true
            sudo docker run -d \
              --name ${{env.IMAGE_NAME}} \
              --restart unless-stopped \
              -p 8080:8080 \
              -e DB_URL=${{ secrets.DB_URL }} \
              -e DB_USERNAME=${{ secrets.DB_USERNAME }} \
              -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
              -e MQTT_URL=${{ secrets.MQTT_URL }} \
              -e MQTT_TOPICS=${{ secrets.MQTT_TOPICS }} \
              ${{ env.IMAGE }}:latest
