<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Temperatures</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
        :root {
            --text: #1f2937;
            --text-muted: #6b7280;
            --line: rgba(0, 0, 0, 0.08);
            --card: rgba(0, 0, 0, 0.03);
            --temp: #dc6b2f;
            --hum: #2f7fdc;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --text: #e5e7eb;
                --text-muted: #9ca3af;
                --line: rgba(255, 255, 255, 0.12);
                --card: rgba(255, 255, 255, 0.04);
                --temp: #f0965a;
                --hum: #6aa9ef;
            }
        }
        * { box-sizing: border-box; }
        html, body { background: transparent; }
        body {
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0.5rem;
            color: var(--text);
            font-size: 0.875rem;
            line-height: 1.4;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(11rem, 1fr));
            gap: 0.625rem;
        }
        .card {
            display: flex;
            flex-direction: column;
            gap: 0.375rem;
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 0.75rem;
            padding: 0.75rem 0.875rem 0.5rem;
        }
        .source {
            font-size: 0.6875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted);
        }
        .readings {
            display: flex;
            align-items: baseline;
            gap: 1rem;
        }
        .value {
            font-variant-numeric: tabular-nums;
            font-size: 1.375rem;
            font-weight: 700;
        }
        .value .unit {
            font-size: 0.75rem;
            font-weight: 500;
            margin-left: 0.125rem;
        }
        .value.temp { color: var(--temp); }
        .value.hum { color: var(--hum); }
        .updated {
            align-self: flex-end;
            font-size: 0.6875rem;
            color: var(--text-muted);
            font-variant-numeric: tabular-nums;
            white-space: nowrap;
        }
        .empty {
            color: var(--text-muted);
            text-align: center;
            padding: 1rem;
            border: 1px dashed var(--line);
            border-radius: 0.75rem;
        }
    </style>
</head>
<body>
<div class="grid">
    <div class="card" th:each="s : ${sources}">
        <div class="source" th:text="${s.source}">living-room</div>
        <div class="readings">
            <span class="value temp"><span th:text="${s.temperature != null} ? ${#numbers.formatDecimal(s.temperature.degreesCelsius, 1, 1)} : '-'">21.5</span><span class="unit">°C</span></span>
            <span class="value hum" th:if="${s.humidity != null}"><span th:text="${#numbers.formatDecimal(s.humidity.humidityPercent, 1, 1)}">45.0</span><span class="unit">%</span></span>
        </div>
        <div class="updated" th:if="${s.temperature != null}" th:text="${#temporals.format(s.temperature.lastRecording, 'yyyy-MM-dd HH:mm')}">2026-01-01 12:00</div>
    </div>
    <div class="empty" th:if="${#lists.isEmpty(sources)}">No data yet</div>
</div>
</body>
</html>
