<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Temperatures</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <style>
        body { font-family: sans-serif; margin: 2rem; }
        table { border-collapse: collapse; }
        th, td { border: 1px solid #ccc; padding: 0.5rem 1rem; text-align: left; }
        th { background: #f0f0f0; }
    </style>
</head>
<body>
<h1>Latest readings</h1>
<table>
    <thead>
    <tr>
        <th>Source</th>
        <th>Temperature (°C)</th>
        <th>Humidity (%)</th>
        <th>Last recorded</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="s : ${sources}">
        <td th:text="${s.source}">living-room</td>
        <td th:text="${s.temperature != null} ? ${#numbers.formatDecimal(s.temperature.degreesCelsius, 1, 1)} : '-'">21.5</td>
        <td th:text="${s.humidity != null} ? ${#numbers.formatDecimal(s.humidity.humidityPercent, 1, 1)} : '-'">45.0</td>
        <td th:text="${s.temperature != null} ? ${#temporals.format(s.temperature.lastRecording, 'yyyy-MM-dd HH:mm')} : ''">2026-01-01 12:00</td>
    </tr>
    <tr th:if="${#lists.isEmpty(sources)}">
        <td colspan="4">No data yet</td>
    </tr>
    </tbody>
</table>
</body>
</html>
